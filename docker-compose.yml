services:
  nanobot-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nanobot-gateway
    restart: unless-stopped
    ports:
      - "18790:18790"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      NANOBOT_MODEL: ${NANOBOT_MODEL:-openai/gpt-4o-mini}
      NANOBOT_PORT: ${NANOBOT_PORT:-18790}
    volumes:
      - nanobot_data:/root/.nanobot

volumes:
  nanobot_data:
