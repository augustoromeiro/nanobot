services:
  nanobot-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nanobot-gateway
    restart: unless-stopped
    ports:
      - "18790:18790"
    volumes:
      - nanobot_data:/root/.nanobot
      - codex_data:/root/.codex

volumes:
  nanobot_data:
  codex_data:
